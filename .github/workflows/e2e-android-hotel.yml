name: Hotel Tests (Remote TestKit)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'テスト対象プラットフォーム'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run hotel tests (Remote TestKit)
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'ios' }}"
          if [ "$PLATFORM" = "android" ]; then
            npm run rtk.android.hotel
          else
            npm run rtk.ios.hotel
          fi
        env:
          RTK_USERNAME: ${{ secrets.RTK_USERNAME }}
          RTK_ACCESSTOKEN: ${{ secrets.RTK_ACCESSTOKEN }}

      - name: Upload allure results as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ github.event.inputs.platform || 'ios' }}
          path: allure-results-${{ github.event.inputs.platform || 'ios' }}-*
          retention-days: 30

      - name: Generate Allure report
        if: always()
        run: ./node_modules/.bin/allure generate allure-results-${{ github.event.inputs.platform || 'ios' }}-* --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Notify Slack
        if: always()
        run: node scripts/notify-slack.mjs
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
