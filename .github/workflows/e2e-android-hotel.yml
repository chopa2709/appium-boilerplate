name: iOS Hotel Tests (Remote TestKit)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run hotel tests on iOS (Remote TestKit)
        run: npm run rtk.ios.hotel
        env:
          RTK_USERNAME: ${{ secrets.RTK_USERNAME }}
          RTK_ACCESSTOKEN: ${{ secrets.RTK_ACCESSTOKEN }}

      - name: Generate Allure report
        if: always()
        run: ./node_modules/.bin/allure generate allure-results-ios-* --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
